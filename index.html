<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Simulasi Kota Indonesia Siang-Malam</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif}
  canvas{display:block;touch-action:none}
  #ui{position:absolute;top:14px;right:14px;z-index:10;display:flex;gap:8px}
  button{padding:10px 14px;border:none;border-radius:12px;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);font-weight:700;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,0.25);cursor:pointer;color:#0f172a}
  button:active{transform:scale(0.97)}
  #info{position:absolute;left:12px;top:12px;color:#e2e8f0;background:rgba(2,6,23,0.55);padding:8px 12px;border-radius:10px;font-size:12px;backdrop-filter:blur(6px);z-index:10;line-height:1.3;max-width:60vw}
  #clock{position:absolute;right:14px;top:64px;z-index:10;background:rgba(2,6,23,0.65);color:#e2e8f0;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;backdrop-filter:blur(6px)}
  #tooltip{position:absolute;pointer-events:none;background:rgba(15,23,42,0.96);color:#fff;padding:8px 12px;border-radius:9px;font-size:13px;white-space:nowrap;opacity:0;transform:translateY(4px);transition:opacity .18s,transform .18s;z-index:20;box-shadow:0 8px 20px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.08)}
  #tooltip.show{opacity:1;transform:translateY(0)}
  @media (max-width:500px){#info{font-size:11px;left:8px;top:8px}button{padding:9px 12px;font-size:13px}#clock{top:58px}}
</style>
</head>
<body>
<div id="ui"><button id="toggle">Malam</button><button id="rain">Hujan</button></div>
<div id="clock">06:00</div>
<div id="info">Simulasi Kota • Klik orang, hewan & pedagang keliling • Geser awan</div>
<div id="tooltip"></div>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  const toggle = document.getElementById('toggle');
  const rainBtn = document.getElementById('rain');
  
  let dpr=1, W=0, H=0, roadTop=0, roadBottom=0, topWalk=0, bottomWalk=0;
  let isDay = true;
  let dayPhase = 1;
  let time=0;
  
  let stars=[], clouds=[], people=[], vehicles=[], birds=[], gerobaks=[], lampPosts=[];
  let dragging=null, dragOff={x:0,y:0};
  let mouse={x:0,y:0};
  let isRaining=false;
  let rainDrops=[];
  let mangRoti={x:0,dir:-1,v:0.18,lastLog:0};
  let audioCtx=null, rainAudio=null, crickets=null;
  let cats={}, butterflies=[], fireflies=[], buildings=[];
  let kites=[], chickens=[], masMie={active:false,x:0,y:0,speed:0.85,nextSpawn:0}, roosterPlayed=false;

  let scheduleStart=performance.now();
  let currentPhase='pagi', lastPhase='';
  let chickenFlapUntil=0;
  let wetRipples=[];
  let sdKids=[];
  let iceVendor={active:false,x:-80};
  let ballKids={active:false,ballX:0,dir:1};
  let lastCatChase=0;
  let bananaTrees=[];

  let posRonda=null;
  let rondaTeam=[];
  let soreKids=[];
  let mbokJamu={active:false,x:-60,y:0,v:0.32};
  let tukangSayur={active:false,x:0,y:0,v:-0.45,lastYell:0,yellTimer:0};
  let baksoSore={active:false,x:-80,y:0,v:0.38};
  let tukangCilok={active:false,x:0,y:0,v:0.46,lastYell:0,yellTimer:0,smoke:[]};

  // normalisasi kecepatan gerak biar konsisten di semua refresh rate layar (60/90/120Hz),
  // jadi gerakannya tetap mulus & tidak "meloncat" saat tab sempat lag/di-background.
  let spd = 1, lastFrameT = 0;

  function lerp(a,b,t){return a+(b-a)*t}
  function lerpColor(c1,c2,t){
    const h2r = h=>{h=h.replace('#',''); if(h.length===3)h=h.split('').map(x=>x+x).join(''); return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)]}
    const [r1,g1,b1]=h2r(c1); const [r2,g2,b2]=h2r(c2);
    return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`
  }

  function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
  function playTing(){ ensureAudio(); const now=audioCtx.currentTime; [0,0.18].forEach(d=>{ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1240, now+d); o.frequency.exponentialRampToValueAtTime(820, now+d+0.12); g.gain.setValueAtTime(0.0001, now+d); g.gain.exponentialRampToValueAtTime(0.26, now+d+0.01); g.gain.exponentialRampToValueAtTime(0.0001, now+d+0.14); o.connect(g).connect(audioCtx.destination); o.start(now+d); o.stop(now+d+0.16); }); }
  function playRooster(){ ensureAudio(); const now=audioCtx.currentTime; for(let rep=0;rep<2;rep++){ const t0=now+rep*0.68; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); const f=audioCtx.createBiquadFilter(); o.type='sawtooth'; o.frequency.setValueAtTime(520,t0); o.frequency.linearRampToValueAtTime(880,t0+0.11); o.frequency.linearRampToValueAtTime(460,t0+0.28); o.frequency.linearRampToValueAtTime(720,t0+0.44); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.26,t0+0.015); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.52); f.type='bandpass'; f.frequency.value=1100; o.connect(f).connect(g).connect(audioCtx.destination); o.start(t0); o.stop(t0+0.55); } }
  function playMieTing(){ ensureAudio(); const now=audioCtx.currentTime; [0,0.16,0.32].forEach(d=>{ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(720, now+d); o.frequency.exponentialRampToValueAtTime(380, now+d+0.07); g.gain.setValueAtTime(0.0001, now+d); g.gain.exponentialRampToValueAtTime(0.24, now+d+0.008); g.gain.exponentialRampToValueAtTime(0.001, now+d+0.09); o.connect(g).connect(audioCtx.destination); o.start(now+d); o.stop(now+d+0.11); }); }
  function playAdzan(){ ensureAudio(); const now=audioCtx.currentTime; [523,587,659,698,784,659,523].forEach((f,i)=>{ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(f, now+i*0.38); g.gain.setValueAtTime(0.0001, now+i*0.38); g.gain.exponentialRampToValueAtTime(0.16, now+i*0.38+0.04); g.gain.exponentialRampToValueAtTime(0.0001, now+i*0.38+0.34); o.connect(g).connect(audioCtx.destination); o.start(now+i*0.38); o.stop(now+i*0.38+0.36); }); }
  function playKentongan(){ ensureAudio(); const now=audioCtx.currentTime; [0,0.22,0.44].forEach(d=>{ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); const f=audioCtx.createBiquadFilter(); o.type='square'; o.frequency.setValueAtTime(185, now+d); o.frequency.exponentialRampToValueAtTime(140, now+d+0.05); f.type='bandpass'; f.frequency.value=720; f.Q.value=0.9; g.gain.setValueAtTime(0.0001, now+d); g.gain.exponentialRampToValueAtTime(0.3, now+d+0.007); g.gain.exponentialRampToValueAtTime(0.0001, now+d+0.12); o.connect(f).connect(g).connect(audioCtx.destination); o.start(now+d); o.stop(now+d+0.14); }); }
  function playSayur(){ ensureAudio(); const now=audioCtx.currentTime; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(420,now); o.frequency.linearRampToValueAtTime(320,now+0.18); o.frequency.linearRampToValueAtTime(380,now+0.32); g.gain.setValueAtTime(0.0001,now); g.gain.exponentialRampToValueAtTime(0.22,now+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+0.34); o.connect(g).connect(audioCtx.destination); o.start(now); o.stop(now+0.36); }
  function playCilokBell(){ ensureAudio(); const now=audioCtx.currentTime; [0,0.14,0.28].forEach(d=>{ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='square'; o.frequency.setValueAtTime(950, now+d); g.gain.setValueAtTime(0.0001, now+d); g.gain.exponentialRampToValueAtTime(0.16, now+d+0.008); g.gain.exponentialRampToValueAtTime(0.0001, now+d+0.09); o.connect(g).connect(audioCtx.destination); o.start(now+d); o.stop(now+d+0.1); }); }
  function startRainSound(){ ensureAudio(); if(rainAudio) return; const bufferSize=2*audioCtx.sampleRate; const buffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate); const out=buffer.getChannelData(0); for(let i=0;i<bufferSize;i++) out[i]=Math.random()*2-1; const src=audioCtx.createBufferSource(); src.buffer=buffer; src.loop=true; const filter=audioCtx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=850; const gain=audioCtx.createGain(); gain.gain.value=0.038; src.connect(filter).connect(gain).connect(audioCtx.destination); src.start(); rainAudio={src,gain}; }
  function stopRainSound(){ if(rainAudio){ try{rainAudio.src.stop()}catch{} rainAudio=null; } }
  function startCrickets(){ ensureAudio(); if(crickets) return; crickets={g:audioCtx.createGain(), timers:[], oscs:[]}; crickets.g.gain.value=0.016; crickets.g.connect(audioCtx.destination); for(let i=0;i<3;i++){ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='triangle'; o.frequency.value=3150+Math.random()*500; g.gain.value=0; o.connect(g).connect(crickets.g); o.start(); crickets.oscs.push(o); const chirp=()=>{ const now=audioCtx.currentTime; for(let k=0;k<3;k++){ g.gain.setValueAtTime(0, now+k*0.1); g.gain.linearRampToValueAtTime(0.35, now+k*0.1+0.008); g.gain.exponentialRampToValueAtTime(0.001, now+k*0.1+0.065);} }; const id=setInterval(chirp, 2400+Math.random()*1800+i*600); crickets.timers.push(id); } }
  function stopCrickets(){ if(!crickets) return; crickets.timers.forEach(clearInterval); crickets.oscs.forEach(o=>{try{o.stop()}catch{}}); crickets.g.disconnect(); crickets=null; }
  function logMsg(m){ const info=document.getElementById('info'); if(!info.dataset.orig) info.dataset.orig=info.textContent; info.textContent=m; clearTimeout(logMsg.t); logMsg.t=setTimeout(()=>{ info.textContent=info.dataset.orig; },2600); }

  toggle.onclick = ()=>{ isDay=!isDay; toggle.textContent = isDay?'Malam':'Siang'; if(!isDay){ startCrickets(); } else { stopCrickets(); playRooster(); logMsg('Kukuruyuk! Ayam berkokok pagi'); } };
  rainBtn.onclick = ()=>{ isRaining=!isRaining; rainBtn.textContent=isRaining?'Stop Hujan':'Hujan'; if(isRaining){ logMsg('Hujan turun, warga buka payung'); startRainSound(); } else { stopRainSound(); } };

  function resize(){
    W = innerWidth; H = innerHeight;
    dpr = Math.max(1, Math.min(2, devicePixelRatio||1));
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    roadTop = H*0.48; roadBottom = H*0.62;
    topWalk = roadTop-12; bottomWalk = roadBottom+10;
    layout();
    rainDrops = Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*-H,len:12+Math.random()*9,speed:8+Math.random()*4}));
  }

  function layout(){
    stars = Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*0.42,s:Math.random()*1.5+0.4,p:Math.random()*6.283}));
    clouds = [
      {x:W*0.15,y:H*0.16,s:1,vx:0.12},{x:W*0.38,y:H*0.22,s:0.9,vx:0.08},
      {x:W*0.62,y:H*0.14,s:1.1,vx:0.1},{x:W*0.8,y:H*0.25,s:0.85,vx:0.14},
      {x:W*0.48,y:H*0.10,s:1,vx:0.09}
    ];
    lampPosts = [
      {x:W*0.18,y:roadTop},{x:W*0.52,y:roadTop},{x:W*0.82,y:roadTop},
      {x:W*0.3,y:roadBottom+34},{x:W*0.68,y:roadBottom+34}
    ];
    gerobaks = [
      {type:'bakso',x:W*0.27,y:topWalk-6,smoke:[]},
      {type:'es teh',x:W*0.77,y:topWalk-6,smoke:[]},
      {type:'sate',x:W*0.38,y:bottomWalk+6,smoke:[]}
    ];
    buildings = [
      {id:'rt', name:'Rumah Pak RT', x:W*0.05, w:W*0.18, h:H*0.26, type:'joglo', isBottom:false},
      {id:'warung', name:'Warung Bu Sari', x:W*0.27, w:W*0.21, h:H*0.23, type:'warung', isBottom:false},
      {id:'toko', name:'Toko Sembako', x:W*0.52, w:W*0.19, h:H*0.28, type:'toko', isBottom:false},
      {id:'dewi', name:'Rumah Bu Dewi', x:W*0.75, w:W*0.2, h:H*0.25, type:'betawi', isBottom:false},
      {id:'warkop', name:'Warkop', x:W*0.35, w:W*0.24, h:H*0.2, type:'warkop', isBottom:true},
      {id:'nenek', name:'Rumah Nenek', x:W*0.68, w:W*0.18, h:H*0.17, type:'rumah', isBottom:true},
      {id:'musala', name:'Musala Al-Ikhlas', x:W*0.82, w:W*0.095, h:H*0.18, type:'musala', isBottom:true},
    ];
    buildings.forEach(b=>{
      b.y = b.isBottom ? roadBottom+34 : roadTop-24 - b.h;
      if(b.id==='musala') b.y -= 8;
      const dw = b.type==='toko'?24 : b.type==='warung'?28 : b.type==='warkop'?24 : b.type==='musala'?20 : 22;
      const dh = b.type==='toko'?38 : b.type==='warung'?36 : b.type==='warkop'?34 : b.type==='musala'?30 : 32;
      const rel = b.id==='toko'?0.32 : b.id==='dewi'?0.7 : b.id==='warkop'?0.22 : b.id==='nenek'?0.5 : b.id==='musala'?0.5 : 0.5;
      b.door = {x: b.x + b.w*rel - dw/2, y: b.y + b.h - dh, w:dw, h:dh, open:0, target:0};
    });

    posRonda = {x:W*0.78, y:roadBottom+28, w:54, h:34};
    posRonda.kentongan = {x: posRonda.x + posRonda.w*0.72, y: posRonda.y - 8, r:10};

    cats.orange = {x:W*0.25, y:topWalk-8, dir:1, state:'walk', sitTimer:0, followUntil:0, hoverStart:0, tail:0, chasing:false, chaseTarget:null};
    cats.black = {x:W*0.48, y:bottomWalk+6, dir:-1, state:'patrol', followUntil:0, hoverStart:0, tail:0};

    butterflies = Array.from({length:7},(_,i)=>({x:W*0.12+Math.random()*W*0.6, y:roadTop-70-Math.random()*50, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.25, phase:Math.random()*6.28, col:['#facc15','#38bdf8','#fb923c'][i%3]}));
    fireflies = Array.from({length:20},()=>({x:Math.random()*W, y:roadTop+20+Math.random()*80, p:Math.random()*6.28, s:0.8+Math.random()*1.4}));

    kites = [
      {x:W*0.22,y:H*0.22,baseY:H*0.22,vx:0.26,type:'gabangan',col1:'#ef4444',col2:'#ffffff',phase:0,broken:false,vy:0},
      {x:W*0.58,y:H*0.17,baseY:H*0.17,vx:0.22,type:'butterfly',col1:'#1d4ed8',col2:'#60a5fa',phase:1.4,broken:false,vy:0},
      {x:W*0.78,y:H*0.24,baseY:H*0.24,vx:0.3,type:'gabangan',col1:'#dc2626',col2:'#ffffff',phase:2.2,broken:false,vy:0},
    ];
    chickens = [
      {x:W*0.11,y:topWalk-4,dir:1,vx:0.14,state:'walk',timer:0},
      {x:W*0.18,y:topWalk-5,dir:-1,vx:0.12,state:'idle',timer:performance.now()+1200},
    ];
    masMie.active=false; masMie.x=W+80; masMie.y=topWalk-2; masMie.speed=0.85; masMie.nextSpawn=performance.now()+18000+Math.random()*7000;

    people = [
      {n:'Pak Budi',a:'jualan bakso',x:W*0.27,top:true,v:0.4,c:'#EF4444',homeId:null,nightActive:false},
      {n:'Bu Sari',a:'jaga warung',x:W*0.3,top:true,v:-0.25,c:'#EC4899',homeId:null,nightActive:false},
      {n:'Adi',a:'main HP',x:W*0.2,top:false,v:0.55,c:'#3B82F6',homeId:null,nightActive:true},
      {n:'Rina',a:'jalan sore',x:W*0.8,top:false,v:-0.48,c:'#8B5CF6',homeId:null,nightActive:false},
      {n:'Pak RT',a:'ronda',x:W*0.12,top:true,v:0.3,c:'#059669',homeId:'rt',nightActive:true,isOwner:true},
      {n:'Bu Dewi',a:'menyapu halaman',x:W*0.74,top:true,v:-0.2,c:'#F59E0B',homeId:'dewi',nightActive:false,isOwner:true},
      {n:'Dimas',a:'pulang kerja',x:W*0.42,top:false,v:0.65,c:'#0EA5E9',homeId:null,nightActive:true},
      {n:'Siti',a:'beli es teh',x:W*0.77,top:true,v:0,c:'#DB2777',homeId:null,nightActive:false},
      {n:'Udin',a:'jualan sate',x:W*0.38,top:false,v:0,c:'#92400E',homeId:null,nightActive:false},
      {n:'Lestari',a:'ngobrol',x:W*0.5,top:true,v:0,c:'#14B8A6',pair:1,nightActive:false},
      {n:'Joko',a:'ngobrol',x:W*0.535,top:true,v:0,c:'#6366F1',pair:1,nightActive:true},
      {n:'Maya',a:'lari pagi',x:W*0.9,top:false,v:-0.85,c:'#E11D48',homeId:null,nightActive:true},
      {n:'Nenek',a:'menjemur',x:W*0.7,top:false,v:0.22,c:'#78716C',homeId:'nenek',nightActive:false,isOwner:true},
    ];
    people.forEach(p=>{p.baseV=p.v; p.state='walk'; p.inside=false; p.alpha=1; p.homeTimer=0; p.targetX=null});

    vehicles = [
      {t:'motor',x:-60,y:roadTop+20,baseV:2.3,c:'#DC2626',nightActive:true},
      {t:'motor',x:W+40,y:roadTop+46,baseV:-2.6,c:'#2563EB',nightActive:false},
      {t:'mobil',x:-180,y:roadTop+60,baseV:1.7,c:'#059669',nightActive:false},
      {t:'angkot',x:W+120,y:roadTop+30,baseV:-2,c:'#F59E0B',nightActive:false},
      {t:'becak',x:-140,y:roadTop+38,baseV:0.85,c:'#0D9488',nightActive:true},
      {t:'delman',x:W+170,y:roadTop+58,baseV:-0.55,c:'#B45309',nightActive:false},
    ];
    birds = [
      {x:W*0.1,y:H*0.2,v:0.7},{x:W*0.4,y:H*0.15,v:0.9},{x:W*0.7,y:H*0.23,v:0.6}
    ];
    mangRoti.x = W*0.85; mangRoti.dir=-1; mangRoti.lastLog=0;
    bananaTrees=[{x:W*0.13,y:topWalk-6},{x:W*0.87,y:topWalk-8}];
    mbokJamu.y = topWalk-2;
    tukangSayur.y = topWalk-2;
    baksoSore.y = bottomWalk+6;
    tukangCilok.y = bottomWalk+8;
  }

  window.addEventListener('resize',resize); resize();

  function showTip(txt,x,y){
    tooltip.textContent = txt;
    const tx = Math.min(W-150, Math.max(8, x+10));
    const ty = Math.max(8, y-38);
    tooltip.style.left = tx+'px';
    tooltip.style.top = ty+'px';
    tooltip.classList.add('show');
    clearTimeout(showTip.t); showTip.t=setTimeout(()=>tooltip.classList.remove('show'),2200);
  }

  canvas.addEventListener('pointermove',e=>{
    const r=canvas.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
    if(dragging){ dragging.x = mouse.x - dragOff.x; dragging.y = mouse.y - dragOff.y; canvas.style.cursor='grabbing'; return }
    let hover=false;
    for(const c of clouds){ if(Math.hypot(mouse.x-c.x,mouse.y-c.y)<48*c.s) hover=true }
    for(const p of people){ if(p.inside||p.alpha<0.1) continue; const py=p.top?topWalk:bottomWalk; if(Math.hypot(mouse.x-p.x,mouse.y-py)<22) hover=true }
    if(Math.hypot(mouse.x-mangRoti.x, mouse.y-bottomWalk)<28) hover=true;
    if(masMie.active && Math.hypot(mouse.x-masMie.x, mouse.y-masMie.y)<32) hover=true;
    if(posRonda && Math.hypot(mouse.x-posRonda.kentongan.x, mouse.y-posRonda.kentongan.y)<16) hover=true;
    if(mbokJamu.active && Math.hypot(mouse.x-mbokJamu.x, mouse.y-mbokJamu.y)<22) hover=true;
    if(tukangSayur.active && Math.hypot(mouse.x-tukangSayur.x, mouse.y-tukangSayur.y)<26) hover=true;
    if(baksoSore.active && Math.hypot(mouse.x-baksoSore.x, mouse.y-baksoSore.y)<24) hover=true;
    if(tukangCilok.active && Math.hypot(mouse.x-tukangCilok.x, mouse.y-tukangCilok.y)<26) hover=true;
    for(const v of vehicles){ if((v.t==='becak'||v.t==='delman') && (isDay||v.nightActive) && Math.hypot(mouse.x-v.x, mouse.y-v.y)<34) hover=true; }

      r.bubbleTimer -= 16;
      if(r.bubbleTimer<=0){ r.bubbleTimer = 2200 + Math.random()*1800; r.showBubble = 55; }
      if(r.showBubble>0){ r.showBubble--; ctx.fillStyle='rgba(255,255,255,0.95)'; ctx.beginPath(); ctx.arc(9,-15,5,0,7); ctx.fill(); ctx.fillStyle='#334155'; ctx.font='10px system-ui'; ctx.fillText('...',6,-12); }
      ctx.restore();
    });
  }
  function drawSoreKids(){
    if(soreKids.length===0) return;
    soreKids = soreKids.filter(k=>k.alpha>0);
    soreKids.forEach(k=>{
      if(k.returning){
        const home = buildings.find(b=>b.id===k.homeId);
        if(home){ const tx = home.door.x + home.door.w/2; const dx = tx - k.x; k.x += Math.sign(dx)*0.9; if(Math.abs(dx)<3){ k.alpha -= 0.04; home.door.target=1; } }
        else k.alpha -=0.05;
      } else {
        if(k.type==='hide'){
          const now=performance.now();
          if(k.state==='visible' && now>k.timer){ k.state='toHide'; }
          if(k.state==='toHide'){ k.x += 0.7; if(k.x>(k.hideX||W*0.68)){ k.state='hidden'; k.timer=now+1200; k.alpha=0.4; } }
          else if(k.state==='hidden' && now>k.timer){ k.state='toBack'; k.alpha=1; }
          else if(k.state==='toBack'){ k.x -=0.7; if(k.x< W*0.52){ k.state='visible'; k.timer=now+1800; } }
        }
        if(k.type==='kite'){
          k.kitePhase += 0.02;
          if(!k.broken && Math.random()<0.0015){ k.broken=true; k.fallVy=0; }
          if(k.broken){ k.fallVy+=0.04; k.kiteY+=k.fallVy; if(k.kiteY>30){ k.broken=false; k.kiteY=0; } }
        }
      }
      ctx.save(); ctx.translate(k.x,k.y); ctx.globalAlpha=k.alpha;
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0,9,7,2.5,0,0,7); ctx.fill();
      ctx.scale(0.7,0.7);
      ctx.fillStyle = k.type==='marble'?'#f59e0b': k.type==='hide'?'#3b82f6':'#ef4444';
      ctx.fillRect(-4,-1,8,8);
      ctx.fillStyle='#fdba74'; ctx.beginPath(); ctx.arc(0,-6,3.6,0,7); ctx.fill();
      ctx.strokeStyle='#1e2937'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(-3,7); ctx.lineTo(-3,11); ctx.moveTo(3,7); ctx.lineTo(3,11); ctx.stroke();
      ctx.restore();
      if(k.type==='marble' && !k.returning){
        const other = soreKids.find(o=>o.type==='marble' && o.id!==k.id);
        if(other && k.id===1){
          const mx = (k.x+other.x)/2; const my = (k.y+other.y)/2 +4;
          const off = Math.sin(time*0.008)*6;
          for(let i=0;i<3;i++){ ctx.fillStyle=['#22c55e','#3b82f6','#ef4444'][i]; ctx.beginPath(); ctx.arc(mx+off+i*3-3, my+Math.sin(time*0.01+i)*1.5,2.2,0,7); ctx.fill(); }
        }
      }
      if(k.type==='kite' && !k.returning){
        ctx.save(); ctx.translate(k.x, k.y-8);
        ctx.strokeStyle='rgba(100,116,139,0.5)'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, -22 - (k.broken?k.kiteY:Math.sin(k.kitePhase)*3)); ctx.stroke();
        const ky = -22 - (k.broken?k.kiteY:Math.sin(k.kitePhase)*3);
        ctx.fillStyle='#dc2626'; ctx.beginPath(); ctx.moveTo(0,ky-6); ctx.lineTo(4,ky); ctx.lineTo(0,ky+5); ctx.lineTo(-4,ky); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    });
  }
  function drawButterflies(){ butterflies.forEach(b=>{ b.x+=b.vx+Math.sin(time*0.002+b.phase)*0.65; b.y+=b.vy+Math.cos(time*0.0023+b.phase)*0.52; if(b.x< W*0.1) b.vx=Math.abs(b.vx); if(b.x>W*0.8) b.vx=-Math.abs(b.vx); if(b.y< H*0.18) b.vy=Math.abs(b.vy); if(b.y>roadTop-32) b.vy=-Math.abs(b.vy); ctx.save(); ctx.translate(b.x,b.y); const flap=Math.sin(time*0.02+b.phase)*0.6; ctx.fillStyle=b.col; ctx.globalAlpha=0.92; ctx.scale(0.5,0.5); ctx.beginPath(); ctx.ellipse(-6,0,7,4+flap*2, -0.4,0,7); ctx.fill(); ctx.beginPath(); ctx.ellipse(6,0,7,4+flap*2, 0.4,0,7); ctx.fill(); ctx.fillStyle='#1f2937'; ctx.fillRect(-1,-2,2,5); ctx.restore(); }); }
  function drawFireflies(){ if(dayPhase>0.5 || isRaining) return; fireflies.forEach(f=>{ f.p+=0.018; const a=0.35+0.55*Math.abs(Math.sin(time*0.003+f.p)); ctx.fillStyle=`rgba(253,224,71,${a})`; ctx.beginPath(); ctx.arc(f.x+Math.sin(time*0.001+f.p)*9, f.y+Math.cos(time*0.0016+f.p)*5, f.s,0,7); ctx.fill(); }); }
  function drawBirds(){ if(dayPhase<=0.5) return; birds.forEach(b=>{ b.x+=b.v*spd; if(b.x>W+40) b.x=-40; b.y = H*0.18 + Math.sin(time*0.002+b.x*0.01)*14; const wy=Math.sin(time*0.013+b.x)*5; ctx.save(); ctx.translate(b.x,b.y); ctx.strokeStyle='#0f172a'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(-9,0); ctx.quadraticCurveTo(-4,-5+wy*0.5,0,0); ctx.moveTo(0,0); ctx.quadraticCurveTo(4,-5-wy*0.5,9,0); ctx.stroke(); ctx.restore(); }); }
  function drawOwl(){ if(dayPhase>0.5) return; const lp=lampPosts[2]; const ox=lp.x, oy=lp.y-68; ctx.save(); ctx.translate(ox,oy); ctx.fillStyle='#57534e'; ctx.beginPath(); ctx.ellipse(0,1,11,13,0,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(0,-8,9,0,7); ctx.fill(); ctx.fillStyle='#fde047'; ctx.beginPath(); ctx.arc(-3.2,-9,2.8,0,7); ctx.arc(3.2,-9,2.8,0,7); ctx.fill(); ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(-3.2,-9,1.1,0,7); ctx.arc(3.2,-9,1.1,0,7); ctx.fill(); ctx.fillStyle='#f59e0b'; ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-2,-3); ctx.lineTo(2,-3); ctx.closePath(); ctx.fill(); ctx.restore(); }
  function updateHomes(){ buildings.forEach(b=>{ if(['warung','toko','warkop'].includes(b.id)){ b.door.target = dayPhase>0.45?1:0; } b.door.open += (b.door.target - b.door.open)*0.18; }); people.forEach(p=>{ if(!p.homeId) return; const b=buildings.find(bb=>bb.id===p.homeId); if(!b) return; const doorX=b.door.x+b.door.w/2; if(p.inside){ if(performance.now()>p.homeTimer){ p.inside=false; p.alpha=0; p.x=doorX; p.state='exiting'; b.door.target=1; } return; } if(p.state==='exiting'){ p.alpha=Math.min(1,p.alpha+0.04); if(p.alpha>=1){ p.state='walk'; p.v=p.baseV; b.door.target = ['warung','toko','warkop'].includes(b.id) && dayPhase>0.45?1:0; } return; } if(p.state==='walk' && isDay && Math.random()<0.0007){ p.state='goingHome'; p.targetX=doorX; p.v=0; } if(p.state==='goingHome'){ const dx=doorX-p.x; if(Math.abs(dx)>1.2){ p.x+=Math.sign(dx)*0.65; } else { b.door.target=1; p.alpha=Math.max(0,p.alpha-0.03); if(p.alpha<=0){ p.inside=true; p.homeTimer=performance.now()+6500+Math.random()*2500; p.state='walk'; b.door.target = ['warung','toko','warkop'].includes(b.id) && dayPhase>0.45?1:0; } } } }); }
  function drawRain(){
    ctx.save(); ctx.strokeStyle='rgba(147,197,253,0.65)'; ctx.lineWidth=1.4; ctx.lineCap='round';
    for(const d of rainDrops){ d.y+=d.speed; d.x+=0.8; if(d.y>H+20){ d.y=-20-Math.random()*80; d.x=Math.random()*W; } ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2.5,d.y+d.len); ctx.stroke(); if(d.y>roadTop && d.y<roadTop+5 && Math.random()<0.015) wetRipples.push({x:d.x,y:roadTop+2,r:0,max:7+Math.random()*5,a:0.22}); if(d.y>roadBottom-4 && d.y<roadBottom && Math.random()<0.01) wetRipples.push({x:d.x,y:roadBottom-2,r:0,max:6+Math.random()*4,a:0.2}); }
    ctx.restore();
    if(Math.random()<0.12) wetRipples.push({x:Math.random()*W,y:roadTop+Math.random()*(roadBottom-roadTop),r:0,max:9+Math.random()*5,a:0.18});
    wetRipples.forEach(rp=>{ rp.r+=0.7; rp.a*=0.94; });
    wetRipples = wetRipples.filter(rp=>rp.r<rp.max && rp.a>0.02);
    ctx.save(); wetRipples.forEach(rp=>{ ctx.strokeStyle=`rgba(203,213,225,${rp.a})`; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(rp.x,rp.y,rp.r,0,6.283); ctx.stroke(); }); ctx.restore();
  }

  function loop(t){
    time=t;
    if(!lastFrameT) lastFrameT=t;
    spd = Math.min(2.2, Math.max(0.35, (t-lastFrameT)/16.6667));
    lastFrameT = t;
    dayPhase += ((isDay?1:0)-dayPhase)*0.07;
    const elapsed = ((t - scheduleStart) % 180000)/1000;
    let phase, label;
    if(elapsed<20){ phase='pagi'; label='06:00'; }
    else if(elapsed<60){ phase='siang'; label='12:00'; }
    else if(elapsed<100){ phase='sore'; label='17:00'; }
    else if(elapsed<130){ phase='magrib'; label='18:00'; }
    else { phase='malam'; label='19:30'; }
    const clockEl=document.getElementById('clock'); if(clockEl) clockEl.textContent=label;
    if(phase!==lastPhase){
      lastPhase=phase; currentPhase=phase;
      if(phase==='pagi'){
        logMsg('Pagi cerah, ayam berkokok');
        if(!isDay){ isDay=true; toggle.textContent='Malam'; stopCrickets(); }
        playRooster(); setTimeout(playRooster,650);
        chickenFlapUntil=performance.now()+2800;
        sdKids=[]; iceVendor.active=false; ballKids.active=false; rondaTeam=[];
      } else if(phase==='siang'){
        logMsg('Siang terik, tukang es keliling');
        if(!isDay){ isDay=true; toggle.textContent='Malam'; }
        iceVendor.active=true; iceVendor.x=-80;
        ballKids.active=false;
      } else if(phase==='sore'){
        logMsg('Sore hari, layangan naik');
        ballKids.active=true;
        if(soreKids.length===0){
          soreKids=[
            {type:'marble', id:1, x:W*0.42, y:bottomWalk+10, homeId:'rt', returning:false, alpha:1},
            {type:'marble', id:2, x:W*0.46, y:bottomWalk+12, homeId:'dewi', returning:false, alpha:1},
            {type:'hide', id:3, x:W*0.52, y:bottomWalk+10, state:'visible', timer:performance.now()+1500, homeId:'nenek', returning:false, alpha:1, hideX:W*0.68},
            {type:'kite', id:4, x:W*0.38, y:bottomWalk+9, kiteY:0, kitePhase:0, broken:false, homeId:'warkop', returning:false, alpha:1}
          ];
          logMsg('Anak-anak main sore di depan warkop');
        }
      } else if(phase==='magrib'){
        logMsg('Magrib tiba, adzan berkumandang');
        playAdzan();
        if(isDay){ isDay=false; toggle.textContent='Siang'; startCrickets(); }
        if(soreKids.length>0){ soreKids.forEach(k=>k.returning=true); logMsg('Anak-anak pulang magrib'); }
      } else if(phase==='malam'){
        logMsg('Malam sepi, jangkrik berbunyi');
        startCrickets(); if(crickets) crickets.g.gain.value=0.036;
        iceVendor.active=false; ballKids.active=false;
        rondaTeam = [
          {n:'Pak RT', x:W*0.18, y:bottomWalk+6, v:0.32, dir:1, flash:true, bubbleTimer:0, showBubble:0},
          {n:'Pak Budi', x:W*0.26, y:bottomWalk+6, v:0.30, dir:1, flash:false, bubbleTimer:200, showBubble:0},
          {n:'Danu', x:W*0.34, y:bottomWalk+6, v:0.34, dir:1, flash:false, bubbleTimer:400, showBubble:0},
        ];
        logMsg('Ronda malam dimulai');
      }
    }

    if(phase==='pagi'){
      if(!mbokJamu.active){ mbokJamu.active=true; mbokJamu.x=-70; }
      if(!tukangSayur.active){ tukangSayur.active=true; tukangSayur.x=W+70; tukangSayur.lastYell=performance.now(); }
    } else { mbokJamu.active=false; tukangSayur.active=false; }
    if(phase==='sore' && elapsed>=80 && elapsed<100){
      if(!baksoSore.active){ baksoSore.active=true; baksoSore.x=-80; logMsg('Tukang bakso sore lewat'); }
    } else { baksoSore.active=false; }
    if(phase==='siang' || phase==='sore'){
      if(!tukangCilok.active){ tukangCilok.active=true; tukangCilok.x=-90; tukangCilok.lastYell=performance.now(); logMsg('Tukang cilok lewat, anak-anak jajan'); }
    } else { tukangCilok.active=false; }

    ctx.clearRect(0,0,W,H);
    drawSky();
    drawStars();
    drawSunMoon();
    clouds.forEach(c=>{ if(!dragging||dragging!==c){ c.x+=c.vx*(0.5+dayPhase*0.6)*(isRaining?0.7:1)*spd; } if(c.x>W+90) c.x=-90; if(c.x<-90) c.x=W+90; drawCloud(c); });
    drawKites();
    updateHomes();
    updateCats();
    drawBuildings();
    drawPosRonda();
    drawBananaTrees();
    drawDetails();
    drawRoad();
    drawWetReflections();
    drawLamps();
    drawChickens();
    gerobaks.forEach(g=>{ if(!isDay && g.type!=='bakso') return; drawGerobak(g); });
    vehicles.forEach(drawVehicle);
    people.forEach(drawPerson);
    drawSdKids();
    drawIceVendor();
    drawBallKids();
    updateAndDrawMasMie();
    drawMangRoti();
    drawMbokJamu();
    drawTukangSayur();
    drawBaksoSore();
    drawTukangCilok();
    if(dayPhase>0.5 && !isRaining) drawButterflies(); else drawFireflies();
    drawCats();
    drawRondaTeam();
    drawSoreKids();
    drawBirds();
    drawOwl();
    if(isRaining) drawRain();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  setTimeout(()=>{ if(isDay){ try{ playRooster(); logMsg('Kukuruyuk! Ayam berkokok pagi'); roosterPlayed=true; }catch(e){} } }, 1000);
})();
</script>
